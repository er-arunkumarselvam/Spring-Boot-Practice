<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Financial Overview & Expense Tracker</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* Custom modal width constraint */
        @media (min-width: 576px) {
            .modal-custom-wide {
                max-width: 650px;
            }
        }

        /* Custom non-resizable text area override */
        .no-resize {
            resize: none !important;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container my-5">
        <div id="alert"></div>
        <div class="d-flex mb-4 justify-content-between align-items-center">
            <div>
                <h3 class="text-dark fw-bold mb-1">Financial Overview</h3>
                <p class="text-muted mb-0">Track your income and expenses</p>
            </div>
            <div>
                <button type="button" class="btn btn-primary fw-bold px-4 shadow-sm" data-bs-toggle="modal"
                    data-bs-target="#transactionForm" onclick="prepareNewTransaction()">
                    + New Transaction
                </button>
            </div>
        </div>
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0 rounded-4 bg-white">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-danger fw-semibold small mb-2">Total Expense</h6>
                        <h2 id="totalExpense" class="fw-bold text-dark mb-0">₹ 0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0 rounded-4 bg-white">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-success fw-semibold small mb-2">Total Income</h6>
                        <h2 id="totalIncome" class="fw-bold text-dark mb-0">₹ 0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0 rounded-4 bg-white">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-primary fw-semibold small mb-2">Balance Amount</h6>
                        <h2 id="balanceAmount" class="fw-bold text-dark mb-0">₹ 0</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="card shadow-sm border-0 rounded-4 bg-white p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold text-dark mb-0">Transactions</h4>
                <button type="button" class="btn bg-light text-dark border fw-normal px-2.5 py-1.5 cursor-pointer"
                     onclick="refreshData()">Refresh</button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-borderless align-middle mb-0">
                    <thead class="table-light border-bottom">
                        <tr class="text-center table-dark py-3 fw-semibold">
                            <th>Date</th>
                            <th>Type</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expenseData">
                    </tbody>
                </table>
            </div>
        </div>
        <div class="modal fade" id="transactionForm" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-custom-wide">
                <div class="modal-content border-0 shadow rounded-4">
                    <div class="modal-header border-bottom-0 pt-4 px-4 pb-2">
                        <h1 class="modal-title fs-5 fw-bold" id="staticBackdropLabel">Transaction Form</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body px-4">
                        <form id="saveTransactionForm">
                            <input type="hidden" id="transactionId">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="fw-semibold text-muted small d-block mb-2">Transaction
                                        Type</label>
                                    <div class="d-flex gap-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="transactionType"
                                                id="expense" value="expense" checked>
                                            <label class="form-check-label fw-medium" for="expense">Expense</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="transactionType"
                                                id="income" value="income">
                                            <label class="form-check-label fw-medium" for="income">Income</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-body-secondary small">Title</label>
                                    <input type="text" class="form-control rounded-3" id="title"
                                        placeholder="Ex: Breakfast" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-body-secondary small">Date</label>
                                    <input type="date" class="form-control rounded-3" id="date" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-body-secondary small">Amount</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light rounded-start-3 text-muted">₹</span>
                                        <input type="number" class="form-control rounded-end-3" id="amount"
                                            placeholder="100" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-body-secondary small">Category</label>
                                    <input type="text" class="form-control rounded-3" id="category" placeholder="Food"
                                        required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold text-body-secondary small">Description</label>
                                    <textarea class="form-control rounded-3 no-resize" id="description" rows="3"
                                        placeholder="Ex: Idly & Sambar" style="resize: none;"></textarea>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer border-top-0 pb-4 px-4 pt-3">
                        <button type="button" class="btn btn-light fw-semibold px-4 border"
                            data-bs-dismiss="modal">Close</button>
                        <button type="submit" form="saveTransactionForm"
                            class="btn btn-primary fw-semibold px-4">Save</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <!-- Bootstrap 5.3 Javascript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
        </script>
    <script src="./main.js"></script>
</body>

</html>
